<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{margin:0;padding:0}
.card{
  width:1200px;height:628px;
  background:linear-gradient(135deg,#fef5f0 0%,#fdf9f3 30%,#f6f2f8 60%,#f4f7f2 100%);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  font-family:Georgia,serif;
}
/* Corner ornaments */
.corner{position:absolute;width:120px;height:120px;opacity:0.25}
.corner-tl{top:20px;left:20px;border-top:2px solid #d4a49c;border-left:2px solid #d4a49c}
.corner-tr{top:20px;right:20px;border-top:2px solid #a8c0a2;border-right:2px solid #a8c0a2}
.corner-bl{bottom:20px;left:20px;border-bottom:2px solid #bab0c8;border-left:2px solid #bab0c8}
.corner-br{bottom:20px;right:20px;border-bottom:2px solid #c8aa72;border-right:2px solid #c8aa72}
/* Inner border */
.inner-border{
  position:absolute;inset:35px;
  border:0.5px solid rgba(168,112,106,0.15);
}
/* Diamond accents */
.diamond{position:absolute;width:10px;height:10px;transform:rotate(45deg);opacity:0.3}
.d1{top:30px;left:50%;margin-left:-5px;border:1px solid #d4a49c}
.d2{bottom:30px;left:50%;margin-left:-5px;border:1px solid #a8c0a2}
.d3{top:50%;left:30px;margin-top:-5px;border:1px solid #bab0c8}
.d4{top:50%;right:30px;margin-top:-5px;border:1px solid #c8aa72}
/* Circles decoration */
.deco-circle{position:absolute;border-radius:50%;border:0.5px solid;opacity:0.1}
.dc1{width:300px;height:300px;top:-100px;left:-80px;border-color:#d4a49c}
.dc2{width:250px;height:250px;bottom:-80px;right:-60px;border-color:#a8c0a2}
.dc3{width:200px;height:200px;top:50%;right:-40px;transform:translateY(-50%);border-color:#bab0c8}
/* Watercolor blobs */
.blob{position:absolute;border-radius:50%;filter:blur(50px);opacity:0.15}
.b1{width:250px;height:250px;top:-60px;left:-40px;background:#f5ddd8}
.b2{width:200px;height:200px;bottom:-40px;right:-30px;background:#dce8d8}
.b3{width:180px;height:180px;top:40%;left:60%;background:#e8e0f0}
/* Content */
.content{text-align:center;z-index:2;position:relative}
.label-top{
  font-family:sans-serif;font-size:11px;font-weight:500;
  letter-spacing:0.5em;text-transform:uppercase;color:#7a6e66;
  margin-bottom:14px;
}
.monogram{
  font-family:Georgia,serif;font-size:72px;font-weight:400;
  color:#7a4a42;letter-spacing:0.05em;margin-bottom:6px;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.heart{color:#a8706a;font-size:36px}
.title{
  font-family:Georgia,serif;font-size:38px;font-style:italic;
  color:#a8706a;margin:10px 0;letter-spacing:0.04em;
}
.line{
  width:200px;height:1px;margin:16px auto;
  background:linear-gradient(90deg,transparent,#d4a49c,transparent);
}
.date{
  font-family:sans-serif;font-size:13px;font-weight:400;
  letter-spacing:0.4em;text-transform:uppercase;color:#554a44;
  margin-top:4px;
}
.tagline{
  font-family:Georgia,serif;font-style:italic;font-size:16px;
  color:#96728a;margin-top:14px;letter-spacing:0.03em;
}
/* Small decorative dots */
.dots{display:flex;gap:8px;justify-content:center;margin-top:16px}
.dot{width:4px;height:4px;border-radius:50%}
.dot-r{background:#d4a49c;opacity:0.5}
.dot-s{background:#a8c0a2;opacity:0.5}
.dot-l{background:#bab0c8;opacity:0.5}
.dot-g{background:#c8aa72;opacity:0.5}
</style>
</head>
<body>
<div class="card">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="inner-border"></div>
  <div class="diamond d1"></div>
  <div class="diamond d2"></div>
  <div class="diamond d3"></div>
  <div class="diamond d4"></div>
  <div class="deco-circle dc1"></div>
  <div class="deco-circle dc2"></div>
  <div class="deco-circle dc3"></div>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="content">
    <div class="label-top">You're Invited</div>
    <div class="monogram"><span>Su</span><span class="heart">&#9829;</span><span>Ro</span></div>
    <div class="title">Ring Ceremony</div>
    <div class="line"></div>
    <div class="date">Saturday &ensp; June 27, 2026</div>
    <div class="tagline">She pinged. He replied. The rest is #SuRo.</div>
    <div class="dots">
      <div class="dot dot-r"></div>
      <div class="dot dot-s"></div>
      <div class="dot dot-l"></div>
      <div class="dot dot-g"></div>
    </div>
  </div>
</div>
</body>
</html>
